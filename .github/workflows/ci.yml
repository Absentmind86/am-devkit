name: CI

on:
  push:
    branches: [main, feature/cross-platform]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows — full Python version matrix (primary target platform)
          - os: windows-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.13"
          # Linux — single version to verify cross-platform routing
          - os: ubuntu-latest
            python-version: "3.12"
          # macOS — single version to verify cross-platform routing
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff rich
          # flet (GUI) is excluded from CI — gui.py is the only module that imports it.
          # All unit tests and non-GUI modules run without it.

      - name: Syntax check — non-GUI modules (py_compile)
        shell: bash
        run: |
          python -m py_compile \
            core/brew_util.py \
            core/catalog_install.py \
            core/choco_util.py \
            core/devops.py \
            core/editors.py \
            core/extras.py \
            core/finalize.py \
            core/infrastructure.py \
            core/install_catalog.py \
            core/install_context.py \
            core/installer.py \
            core/languages.py \
            core/launchpad.py \
            core/linux_util.py \
            core/manifest.py \
            core/ml_stack.py \
            core/platform_util.py \
            core/pre_install_summary.py \
            core/preflight.py \
            core/pwsh_util.py \
            core/pyenv_scoop.py \
            core/restore_bundle.py \
            core/sandbox.py \
            core/sanitize.py \
            core/snap_util.py \
            core/system_scan.py \
            core/utilities.py \
            core/winget_util.py \
            core/winutil_presets.py \
            scripts/gpu_detect.py \
            scripts/path_auditor.py

      - name: Ruff lint
        run: ruff check core/ scripts/ tests/

      - name: Run tests
        run: pytest

  pester:
    name: Pester (PowerShell smoke tests)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module Pester

      - name: Run Pester tests
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path tests/ -PassThru -Output Detailed
          if ($result.FailedCount -gt 0) {
            Write-Error "$($result.FailedCount) Pester test(s) failed."
            exit 1
          }
